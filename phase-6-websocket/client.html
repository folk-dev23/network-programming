<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Chat — Folk</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    #messages { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 12px; margin-bottom: 12px; border-radius: 8px; }
    .msg { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
    .system { color: #888; font-style: italic; }
    input { width: 75%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #4338ca; }
    #status { margin-bottom: 12px; font-weight: bold; }
    .connected { color: green; }
    .disconnected { color: red; }
  </style>
</head>
<body>
  <h1>🔌 Raw WebSocket Chat</h1>
  <div id="status" class="disconnected">● ยังไม่ได้เชื่อมต่อ</div>
  <div id="messages"></div>
  <input id="input" type="text" placeholder="พิมพ์ข้อความ..." />
  <button onclick="sendMessage()">ส่ง</button>

  <script>
    const messages = document.getElementById('messages')
    const input = document.getElementById('input')
    const status = document.getElementById('status')

    // เชื่อมต่อ WebSocket Server
    const ws = new WebSocket('ws://localhost:3000')

    ws.onopen = () => {
      status.textContent = '● เชื่อมต่อแล้ว!'
      status.className = 'connected'
      addMessage('เชื่อมต่อ WebSocket Server สำเร็จ!', 'system')
    }

    ws.onmessage = (event) => {
      addMessage(event.data, 'msg')
    }

    ws.onclose = () => {
      status.textContent = '● ตัดการเชื่อมต่อแล้ว'
      status.className = 'disconnected'
      addMessage('ตัดการเชื่อมต่อแล้ว', 'system')
    }

    function sendMessage() {
      const text = input.value.trim()
      if (!text) return
      ws.send(text)
      input.value = ''
    }

    function addMessage(text, className) {
      const div = document.createElement('div')
      div.className = className
      div.textContent = text
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    }

    // กด Enter เพื่อส่ง
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage()
    })
  </script>
</body>
</html>
